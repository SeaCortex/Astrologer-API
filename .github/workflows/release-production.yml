name: Release Astrologer API (Production)

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  SERVICE_NAME: astrologer-api
  ENVIRONMENT: production

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image coordinates
        id: meta
        run: |
          set -euo pipefail
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          image_base="ghcr.io/${owner_lc}/${SERVICE_NAME}"
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "image_base=${image_base}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_base }}:${{ env.ENVIRONMENT }}
            ${{ steps.meta.outputs.image_base }}:${{ env.ENVIRONMENT }}-${{ github.sha }}

      - name: Dispatch artifact to arkana-infra
        env:
          INFRA_REPO: ${{ vars.INFRA_REPO }}
          INFRA_REPO_DISPATCH_TOKEN: ${{ secrets.INFRA_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${INFRA_REPO:-}" ]; then
            echo "Missing required repo variable: INFRA_REPO"
            exit 1
          fi

          if [ -z "${INFRA_REPO_DISPATCH_TOKEN:-}" ]; then
            echo "Missing required secret: INFRA_REPO_DISPATCH_TOKEN"
            exit 1
          fi

          event_type="app-release"
          artifact="${{ steps.meta.outputs.image_base }}@${{ steps.build.outputs.digest }}"

          payload="$(jq -cn \
            --arg event_type "$event_type" \
            --arg service "$SERVICE_NAME" \
            --arg environment "$ENVIRONMENT" \
            --arg artifact "$artifact" \
            --arg source_repo "$GITHUB_REPOSITORY" \
            --arg source_sha "$GITHUB_SHA" \
            '{event_type: $event_type, client_payload: {service: $service, environment: $environment, artifact: $artifact, source_repo: $source_repo, source_sha: $source_sha}}')"

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${INFRA_REPO_DISPATCH_TOKEN}" \
            "https://api.github.com/repos/${INFRA_REPO}/dispatches" \
            -d "$payload"
